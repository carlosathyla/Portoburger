<!-- 🔧 CORREÇÃO 3: FUNÇÃO goTo SEGURA -->
<script>
  const totalSlides = 9;
  let current = 0;

  function goTo(index) {
    const slides = document.querySelectorAll('.slide');

    if (!slides[current]) return;

    slides[current].classList.remove('active');
    slides[current].classList.add('exit');

    setTimeout(() => {
      if (slides[current]) {
        slides[current].classList.remove('exit');
      }
    }, 450);

    current = Math.max(0, Math.min(index, totalSlides - 1));

    if (slides[current]) {
      slides[current].classList.add('active');
    }

    updateUI();
  }

  function nextSlide() {
    if(current < totalSlides-1) goTo(current+1);
  }

  function prevSlide() {
    if(current > 0) goTo(current-1);
  }

  function updateUI() {
    document.getElementById('slideCounter').textContent = `${current+1} / ${totalSlides}`;
    document.getElementById('progressBar').style.width = `${((current+1)/totalSlides)*100}%`;

    document.querySelectorAll('.nav-dot').forEach((d,i) => {
      d.classList.toggle('active', i === current);
    });
  }

  // NAV DOTS
  const dotsContainer = document.getElementById('navDots');
  for(let i = 0; i < totalSlides; i++) {
    const d = document.createElement('div');
    d.className = 'nav-dot' + (i===0?' active':'');
    d.onclick = () => goTo(i);
    dotsContainer.appendChild(d);
  }

  // 🔥 CORREÇÃO CRÍTICA AQUI
  document.addEventListener('keydown', e => {
    if(e.key === 'ArrowRight' || e.code === 'Space') {
      e.preventDefault();
      nextSlide();
    }
    if(e.key === 'ArrowLeft') prevSlide();
  });
</script>
